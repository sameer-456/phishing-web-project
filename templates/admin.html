<html>

<head>
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>📊 Admin Dashboard</h2>

<br>

<a href="/admin/web-history">
<button>Website Detection History</button>
</a>

<br><br>

<a href="/admin/youtube-history">
<button>YouTube Analysis History</button>
</a>

<br><br>

<a href="/admin/graph">
<button>Detection Graph</button>
</a>

<br><br>

<p>Total Checks: {{ total }}</p>
<p>SAFE: {{ safe }}</p>
<p>PHISHING: {{ phishing }}</p>

<hr>

<h3>History</h3>

<table border="1">

<tr>
<th>ID</th>
<th>User</th>
<th>URL</th>
<th>Result</th>
<th>Date</th>
</tr>

{% for row in history %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
</tr>

{% endfor %}

</table>

<br><br>

<a href="/dashboard">Back to Dashboard</a>

</body>

</html>
