<!DOCTYPE html>
<html>
<head>
<title>YouTube Phishing Analysis</title>
</head>

<body>

<h2>YouTube Video Phishing Checker</h2>

<form method="POST">
<input type="text" name="video_url" placeholder="Paste YouTube Link" required>
<button type="submit">Analyze</button>
{% if thumbnail %}

<br><br>

<img src="{{thumbnail}}" width="400">

<h3>{{title}}</h3>

<p><b>Channel :</b> {{channel}}</p>

<p><b>Views :</b> {{views}}</p>

<h3>{{result}}</h3>

{% endif %}
</form>

{% if result %}
<h3>{{ result }}</h3>
{% endif %}

</body>
</html>
