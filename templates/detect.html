<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>
</head>
<body>
    <h2>🔍 URL Phishing Detector</h2>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <h3>{{ result }}</h3>
    {% endif %}

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
